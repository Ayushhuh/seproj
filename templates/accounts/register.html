{% extends 'base.html' %}

{% block title %}Register - Watch Together{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 40px auto; padding: 2rem;">
    
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account 🚀</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Choose a username" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_password1">Password</label>
            <input type="password" name="password1" id="id_password1" placeholder="Create a password" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_password2">Confirm Password</label>
            <input type="password" name="password2" id="id_password2" placeholder="Confirm your password" required>
            
            <!-- Show Password Toggle -->
            <div style="margin-top: 5px;">
                <input type="checkbox" id="showPasswords">
                <label for="showPasswords" style="font-size: 0.9rem;">Show Passwords</label>
            </div>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; padding: 10px;">
            Register
        </button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        Already have an account?
        <a href="{% url 'login' %}" style="color: #e94560; font-weight: 500;">
            Login
        </a>
    </p>
</div>

<!-- JavaScript -->
<script>
    const password1 = document.getElementById("id_password1");
    const password2 = document.getElementById("id_password2");
    const toggle = document.getElementById("showPasswords");

    toggle.addEventListener("change", function () {
        const type = this.checked ? "text" : "password";
        password1.type = type;
        password2.type = type;
    });
</script>

{% endblock %}
