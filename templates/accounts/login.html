{% extends 'base.html' %}

{% block title %}Login - Watch Together{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 40px auto; padding: 2rem;">
    
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back 👋</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
            
            <!-- Show Password Toggle -->
            <div style="margin-top: 5px;">
                <input type="checkbox" id="showPassword">
                <label for="showPassword" style="font-size: 0.9rem;">Show Password</label>
            </div>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; padding: 10px;">
            Login
        </button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        Don’t have an account?
        <a href="{% url 'register' %}" style="color: #e94560; font-weight: 500;">
            Register
        </a>
    </p>
</div>

<!-- JavaScript -->
<script>
    const passwordInput = document.getElementById("id_password");
    const toggle = document.getElementById("showPassword");

    toggle.addEventListener("change", function () {
        if (this.checked) {
            passwordInput.type = "text";
        } else {
            passwordInput.type = "password";
        }
    });
</script>

{% endblock %}
