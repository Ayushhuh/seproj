{% extends 'base.html' %}

{% block title %}Create Room - Watch Together{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 1.5rem;">Create a New Room</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <p style="margin-bottom: 1rem; color: #aaa;">
            Create a new watch party room to watch videos together with friends.
        </p>
        
        <button type="submit" class="btn" style="width: 100%;">Create Room</button>
    </form>
</div>
{% endblock %}
